name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[test]"
      - run: python -m pytest tests/ -v
      - name: Verify CLI
        run: lazyjira --version

  release:
    needs: test
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build tomli tomli-w

      - name: Determine version bump
        id: bump
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s' "$MSG" | grep -qE '^feat!|BREAKING CHANGE'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$MSG" | grep -qE '^feat'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in pyproject.toml
        id: ver
        run: |
          python <<'PY'
          import tomli, tomli_w, os
          with open('pyproject.toml','rb') as f: d = tomli.load(f)
          v = d['project']['version']
          parts = [int(x) for x in v.split('.')]
          bump = '${{ steps.bump.outputs.type }}'
          if bump == 'major': parts = [parts[0]+1, 0, 0]
          elif bump == 'minor': parts = [parts[0], parts[1]+1, 0]
          else: parts = [parts[0], parts[1], parts[2]+1]
          new = '.'.join(str(x) for x in parts)
          d['project']['version'] = new
          with open('pyproject.toml','wb') as f: tomli_w.dump(d, f)
          with open(os.environ['GITHUB_OUTPUT'],'a') as f:
              f.write(f"version={new}\n")
              f.write(f"tag=v{new}\n")
          PY

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Commit + tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release ${{ steps.ver.outputs.tag }} [skip ci]"
          git tag "${{ steps.ver.outputs.tag }}"
          git push
          git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
